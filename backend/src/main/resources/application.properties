spring.application.name=voice-ide-backend
server.port=${PORT:8080}

# MySQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# AI
ai.provider=${AI_PROVIDER:gemini}

ai.gemini.api-key=${GEMINI_API_KEY}
ai.gemini.model=gemini-1.5-flash
ai.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

ai.groq.api-key=${GROQ_API_KEY}
ai.groq.model=llama3-70b-8192
ai.groq.url=https://api.groq.com/openai/v1/chat/completions

ai.ollama.url=http://localhost:11434/api/generate
ai.ollama.model=codellama

# JDoodle
code.executor=jdoodle
code.jdoodle.client-id=${JDOODLE_CLIENT_ID}
code.jdoodle.client-secret=${JDOODLE_CLIENT_SECRET}
code.jdoodle.url=https://api.jdoodle.com/v1/execute

spring.websocket.path=/ws

logging.level.com.voiceide=DEBUG
logging.level.org.springframework.web.socket=INFO